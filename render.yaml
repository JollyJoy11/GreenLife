services:
  - type: web
    name: greenlife-plant-id
    runtime: python
    rootDir: Plant
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn plant_identification:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1 --preload
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
